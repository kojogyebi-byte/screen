name: ScreenExtend
options:
  bundleIdPrefix: com.shamaapps
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    ENABLE_HARDENED_RUNTIME: NO
    DEAD_CODE_STRIPPING: YES
    SWIFT_OBJC_BRIDGING_HEADER: "ObjC/ScreenExtend-Bridging-Header.h"

targets:
  ScreenExtend:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: ObjC
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shamaapps.screenextend
        PRODUCT_NAME: Expanse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_OBJC_BRIDGING_HEADER: "ObjC/ScreenExtend-Bridging-Header.h"
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Expanse
        CFBundleDisplayName: Expanse
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        LSUIElement: false
        LSApplicationCategoryType: "public.app-category.utilities"
        NSHumanReadableCopyright: "© 2026 Shamaapps"
        NSLocalNetworkUsageDescription: "Expanse finds Android tablets on your local network so you can pick one to extend your Mac's screen to."
        NSBonjourServices:
          - "_expanse._tcp"
    entitlements:
      path: ScreenExtend.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true
        com.apple.security.network.client: true

schemes:
  ScreenExtend:
    build:
      targets:
        ScreenExtend: all
    run:
      config: Release
    archive:
      config: Release
