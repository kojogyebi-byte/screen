name: Build macOS app

on:
  push:
    paths:
      - "Sources/**"
      - "ObjC/**"
      - "project.yml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, ad-hoc signed)
        run: |
          xcodebuild \
            -project ScreenExtend.xcodeproj \
            -scheme ScreenExtend \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            build

      - name: Zip app
        run: |
          APP="build/Build/Products/Release/ScreenExtend.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "ScreenExtend-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenExtend-macOS
          path: ScreenExtend-macos.zip
          if-no-files-found: error
