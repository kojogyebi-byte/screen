name: Build macOS app

on:
  push:
    paths:
      - "mac/**"
      - ".github/workflows/macos.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes (diagnostic)
        run: xcodebuild -list -project ScreenExtend.xcodeproj

      - name: Build (Release, ad-hoc signed)
        run: |
          xcodebuild \
            -project ScreenExtend.xcodeproj \
            -scheme ScreenExtend \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            build

      - name: Zip app
        run: |
          APP="build/Build/Products/Release/Expanse.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "Expanse-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Expanse-macOS
          path: mac/Expanse-macos.zip
          if-no-files-found: error
